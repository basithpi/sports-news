name: Daily YouTube Shorts Upload

on:
  schedule:
    # Runs at 7:00 AM IST (01:30 UTC) daily
    - cron: '30 1 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  upload-shorts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Create credentials file
        env:
          GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          python3 << 'PYTHON_EOF'
          import os
          import json
          import base64
          
          creds_b64 = os.environ.get('GOOGLE_CREDENTIALS_B64', '')
          
          if not creds_b64:
              print("ERROR: No credentials in environment")
              exit(1)
          
          try:
              # Decode from base64
              creds_json = base64.b64decode(creds_b64).decode('utf-8')
              credentials = json.loads(creds_json)
              
              # Write to file
              with open('client_secret.json', 'w') as f:
                  json.dump(credentials, f)
              
              print("✓ Credentials file created successfully")
          except Exception as e:
              print(f"ERROR: Failed to create credentials: {e}")
              exit(1)
          PYTHON_EOF

      - name: Restore OAuth token
        env:
          GOOGLE_OAUTH_TOKEN_B64: ${{ secrets.GOOGLE_OAUTH_TOKEN }}
        run: |
          python3 << 'PYTHON_EOF'
          import os
          import json
          import base64
          
          token_b64 = os.environ.get('GOOGLE_OAUTH_TOKEN_B64', '')
          
          if token_b64:
              try:
                  # Decode from base64
                  token_json = base64.b64decode(token_b64).decode('utf-8')
                  token_data = json.loads(token_json)
                  
                  # Write to file
                  with open('token.json', 'w') as f:
                      json.dump(token_data, f)
                  
                  print("✓ OAuth token restored")
              except Exception as e:
                  print(f"WARNING: Failed to restore token: {e}")
          else:
              print("No OAuth token in secrets")
          PYTHON_EOF
        continue-on-error: true

      - name: Generate and upload 15 shorts
        run: |
          python sports_shorts_pipeline.py \
            --count 15 \
            --schedule-start "$(python -c "from datetime import datetime, timezone, timedelta; print((datetime.now(timezone.utc) + timedelta(minutes=5)).astimezone().isoformat())")" \
            --schedule-interval-minutes 15
        continue-on-error: false

      - name: Save OAuth token for next run
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: google-token
          path: token.json
          retention-days: 90
        continue-on-error: true

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f client_secret.json
          echo "Credentials cleaned up"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: upload-logs-${{ github.run_number }}
          path: output/
          retention-days: 7
        continue-on-error: true