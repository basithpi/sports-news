name: Daily YouTube Shorts Upload

on:
  schedule:
    # Runs at 7:00 AM IST (01:30 UTC) daily
    - cron: '30 1 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  upload-shorts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Create credentials file
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          python << 'PYTHON_EOF'
          import os
          import json
          
          creds_raw = os.environ.get('GOOGLE_CREDENTIALS', '')
          
          if not creds_raw:
              print("ERROR: No credentials in environment")
              exit(1)
          
          try:
              # Try parsing as-is first
              parsed = json.loads(creds_raw)
          except json.JSONDecodeError:
              # GitHub secrets corrupted JSON - manually rebuild it
              try:
                  # Parse the unquoted JSON manually by splitting on commas and colons
                  # Convert {key1:val1,key2:val2} to {"key1":"val1","key2":"val2"}
                  
                  # Step 1: Find all key:value pairs
                  import re
                  # Remove spaces and handle the structure
                  text = creds_raw.strip()
                  
                  # Build a proper JSON by inserting quotes strategically
                  result = {}
                  
                  # Extract the inner object if wrapped in {installed:{...}}
                  if '{installed:' in text:
                      # Handle nested structure
                      inner_start = text.index('{', text.index('{') + 1)  # find 2nd {
                      inner_end = text.rfind('}') - 1  # find 2nd to last }
                      inner_text = text[inner_start+1:inner_end]
                      
                      # Parse inner key:value pairs
                      # Split carefully to handle values with colons (URLs)
                      pairs = []
                      current_pair = ""
                      depth = 0
                      in_url = False
                      
                      for char in inner_text:
                          if char == ':' and not in_url:
                              current_pair += char
                              in_url = current_pair.endswith('https:') or current_pair.endswith('http:')
                          elif char == ',' and not in_url:
                              pairs.append(current_pair.strip())
                              current_pair = ""
                              in_url = False
                          else:
                              current_pair += char
                              if current_pair.endswith('//'):
                                  in_url = True
                      
                      if current_pair.strip():
                          pairs.append(current_pair.strip())
                      
                      # Now parse each pair
                      for pair in pairs:
                          if ':' not in pair:
                              continue
                          key, val = pair.split(':', 1)
                          key = key.strip()
                          val = val.strip()
                          result[key] = val
                  
                  parsed = result
              except Exception as e2:
                  print(f"Fallback parsing failed: {e2}")
                  raise
          
          # Write to file
          with open('client_secret.json', 'w') as f:
              json.dump(parsed, f)
          print("✓ Credentials file created and validated")
          PYTHON_EOF

      - name: Restore OAuth token
        uses: actions/download-artifact@v4
        with:
          name: google-token
          path: .
        continue-on-error: true

      - name: Generate and upload 15 shorts
        run: |
          python sports_shorts_pipeline.py \
            --count 15 \
            --schedule-start "$(python -c "from datetime import datetime, timezone, timedelta; print((datetime.now(timezone.utc) + timedelta(minutes=5)).astimezone().isoformat())")" \
            --schedule-interval-minutes 15
        continue-on-error: false

      - name: Save OAuth token for next run
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: google-token
          path: token.json
          retention-days: 90
        continue-on-error: true

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f client_secret.json
          echo "Credentials cleaned up"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: upload-logs-${{ github.run_number }}
          path: output/
          retention-days: 7
        continue-on-error: true
