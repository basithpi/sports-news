name: Daily YouTube Shorts Upload

on:
  schedule:
    # Runs at 7:00 AM IST (01:30 UTC) daily
    - cron: '30 1 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  upload-shorts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Create credentials file
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          python << 'PYTHON_EOF'
          import os
          import json
          
          # Get raw secret
          creds_raw = os.environ.get('GOOGLE_CREDENTIALS', '')
          
          if not creds_raw:
              print("ERROR: No credentials in environment")
              exit(1)
          
          try:
              # Try parsing as-is first
              try:
                  parsed = json.loads(creds_raw)
              except json.JSONDecodeError:
                  # If that fails, it might have unescaped quotes
                  # Add them back manually
                  import re
                  # Replace single-key patterns like {installed:{ with {"installed":{
                  fixed = creds_raw
                  fixed = re.sub(r'\{(\w+):', r'{"\\1":', fixed)
                  fixed = re.sub(r',(\w+):', r',"\1":', fixed)
                  parsed = json.loads(fixed)
              
              # Write to file
              with open('client_secret.json', 'w') as f:
                  json.dump(parsed, f)
              print("✓ Credentials file created and validated")
          except Exception as e:
              print(f"ERROR: {e}")
              print(f"Got (first 200 chars): {creds_raw[:200]}")
              exit(1)
          PYTHON_EOF

      - name: Restore OAuth token
        uses: actions/download-artifact@v4
        with:
          name: google-token
          path: .
        continue-on-error: true

      - name: Generate and upload 15 shorts
        run: |
          python sports_shorts_pipeline.py \
            --count 15 \
            --schedule-start "$(python -c "from datetime import datetime, timezone, timedelta; print((datetime.now(timezone.utc) + timedelta(minutes=5)).astimezone().isoformat())")" \
            --schedule-interval-minutes 15
        continue-on-error: false

      - name: Save OAuth token for next run
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: google-token
          path: token.json
          retention-days: 90
        continue-on-error: true

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f client_secret.json
          echo "Credentials cleaned up"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: upload-logs-${{ github.run_number }}
          path: output/
          retention-days: 7
        continue-on-error: true
