name: Daily YouTube Shorts Upload

on:
  schedule:
    # Runs at 7:00 AM IST (01:30 UTC) daily
    - cron: '30 1 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  upload-shorts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Create credentials file
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          python << 'PYTHON_EOF'
          import os
          import json
          
          creds_raw = os.environ.get('GOOGLE_CREDENTIALS', '')
          
          if not creds_raw:
              print("ERROR: No credentials in environment")
              exit(1)
          
          try:
              # Try parsing as-is first
              parsed = json.loads(creds_raw)
          except json.JSONDecodeError:
              # GitHub secrets corrupted JSON - manually rebuild it
              # Parse the unquoted JSON carefully to handle types correctly
              import re
              text = creds_raw.strip()
              result = {}
              
              # Extract the inner object if wrapped in {installed:{...}}
              if '{installed:' in text:
                  inner_start = text.index('{', text.index('{') + 1)
                  inner_end = text.rfind('}') - 1
                  inner_text = text[inner_start+1:inner_end]
                  
                  # Parse key:value pairs carefully
                  pairs = []
                  current_pair = ""
                  in_url = False
                  in_array = False
                  bracket_depth = 0
                  
                  for i, char in enumerate(inner_text):
                      if char == '[':
                          in_array = True
                          bracket_depth += 1
                          current_pair += char
                      elif char == ']':
                          bracket_depth -= 1
                          current_pair += char
                          if bracket_depth == 0:
                              in_array = False
                      elif char == ':' and not in_url and not in_array:
                          current_pair += char
                          in_url = current_pair.endswith('https:') or current_pair.endswith('http:')
                      elif char == ',' and not in_url and not in_array:
                          pairs.append(current_pair.strip())
                          current_pair = ""
                          in_url = False
                      else:
                          current_pair += char
                          if current_pair.endswith('//'):
                              in_url = True
                  
                  if current_pair.strip():
                      pairs.append(current_pair.strip())
                  
                  # Parse each pair, respecting types
                  for pair in pairs:
                      if ':' not in pair:
                          continue
                      key, val = pair.split(':', 1)
                      key = key.strip()
                      val = val.strip()
                      
                      # Handle arrays
                      if val.startswith('[') and val.endswith(']'):
                          # Parse array
                          array_content = val[1:-1]
                          items = [item.strip().strip('"') for item in array_content.split(',')]
                          result[key] = items
                      else:
                          result[key] = val
              
              parsed = {'installed': result}
          
          # Write to file
          with open('client_secret.json', 'w') as f:
              json.dump(parsed, f)
          
          # Verify
          with open('client_secret.json') as f:
              written = json.load(f)
              if 'installed' in written and 'redirect_uris' in written['installed']:
                  if isinstance(written['installed']['redirect_uris'], list):
                      print("✓ Credentials valid: redirect_uris is a list")
                  else:
                      print(f"⚠ WARNING: redirect_uris is {type(written['installed']['redirect_uris'])}")
          PYTHON_EOF

      - name: Restore OAuth token
        uses: actions/download-artifact@v4
        with:
          name: google-token
          path: .
        continue-on-error: true

      - name: Generate and upload 15 shorts
        run: |
          python sports_shorts_pipeline.py \
            --count 15 \
            --schedule-start "$(python -c "from datetime import datetime, timezone, timedelta; print((datetime.now(timezone.utc) + timedelta(minutes=5)).astimezone().isoformat())")" \
            --schedule-interval-minutes 15
        continue-on-error: false

      - name: Save OAuth token for next run
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: google-token
          path: token.json
          retention-days: 90
        continue-on-error: true

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f client_secret.json
          echo "Credentials cleaned up"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: upload-logs-${{ github.run_number }}
          path: output/
          retention-days: 7
        continue-on-error: true
